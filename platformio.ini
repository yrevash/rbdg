; PlatformIO config for ESP32 Robot Dog
;
; Build & upload:
;   pio run -t upload
;
; Serial monitor:
;   pio device monitor
;
; If you don't have PlatformIO, install it:
;   pip install platformio
;   OR use the VS Code PlatformIO extension
;
; Alternative: Arduino IDE with ESP32 Board v2.0.17 (Boards Manager)
;   Install libraries manually: ESP32_ISR_Servo 1.5.0, ESPAsyncWebServer,
;   AsyncTCP, MPU9250_WE, Adafruit PWM Servo Driver, INA219_WE

[platformio]
src_dir = software/robot_dog_esp32

[env:esp32dev]
platform = espressif32@5.4.0
board = esp32dev
framework = arduino

; Exclude libs/ from auto-compilation. The .cpp files in libs/ are
; deliberately #include'd into the main sketch as a single compilation
; unit (original design). Auto-compiling them would cause "multiple
; definition" linker errors.
build_src_filter = +<*> -<libs/>

monitor_speed = 115200

lib_deps =
    khoih-prog/ESP32_ISR_Servo@1.5.0
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    wollewald/MPU9250_WE@1.2.6
    adafruit/Adafruit PWM Servo Driver Library@2.4.1
    wollewald/INA219_WE@1.3.8
